linters:
  enable:
    - errcheck      # unchecked errors
    - gosimple      # simplification suggestions
    - govet         # go vet checks
    - ineffassign   # ineffectual assignments
    - staticcheck   # static analysis
    - unused        # unused code
    - gofmt         # formatting
    - misspell      # spelling mistakes

linters-settings:
  gofmt:
    simplify: true

issues:
  exclude-rules:
    # Test files: allow unused helper variables and unchecked errors from WriteFile
    - path: _test\.go
      linters:
        - errcheck
