name: Go Test

on:
  push:
    branches:
      - main
    paths:
      - "mcp/**"
      - ".github/workflows/go-test.yml"
  pull_request:
    paths:
      - "mcp/**"
      - ".github/workflows/go-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: mcp/go.sum

      - name: Run tests
        working-directory: mcp
        run: go test ./... -v -race
