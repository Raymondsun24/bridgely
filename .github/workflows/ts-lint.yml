name: TS Lint

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "eslint.config.mjs"
      - "tsconfig.json"
      - "package*.json"
      - ".github/workflows/ts-lint.yml"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - run: npm ci

      - name: ESLint
        run: npm run lint
